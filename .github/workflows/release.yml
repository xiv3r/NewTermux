name: NewTermux Full Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.0.1'

jobs:
  patch-bootstraps:
    name: Patch Bootstrap (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64, i686]
    steps:
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y patchelf jq zip

      - name: Download official Termux bootstrap
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/termux/termux-packages/releases/latest")
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r --arg arch "bootstrap-${{ matrix.arch }}.zip" '.assets[] | select(.name == $arch) | .browser_download_url')
          curl -L -o "bootstrap-${{ matrix.arch }}.zip" "$DOWNLOAD_URL"

      - name: Patch bootstrap paths
        run: |
          ARCH="${{ matrix.arch }}"
          OLD_PKG="com.termux"
          NEW_PKG="com.newtermux.app"
          OLD_PREFIX="/data/data/${OLD_PKG}/files"
          NEW_PREFIX="/data/data/${NEW_PKG}/files"
          
          mkdir -p extract
          unzip -q "bootstrap-${ARCH}.zip" -d extract/
          cd extract
          
          # 1. Patch SYMLINKS.txt
          if [ -f SYMLINKS.txt ]; then 
            sed -i "s|${OLD_PREFIX}|${NEW_PREFIX}|g" SYMLINKS.txt
          fi
          
          # 2. Patch Files
          echo "Starting deep patch..."
          find . -type f | while read f; do
            if file "$f" | grep -q 'ELF'; then
              # ELF binary: use patchelf (safe for length changes)
              # Patch Interpreter (Dynamic Linker)
              INTERP=$(patchelf --print-interpreter "$f" 2>/dev/null || true)
              if [ -n "$INTERP" ] && echo "$INTERP" | grep -qF "$OLD_PKG"; then
                NEW_INTERP=$(echo "$INTERP" | sed "s|${OLD_PKG}|${NEW_PKG}|g")
                patchelf --set-interpreter "$NEW_INTERP" "$f" 2>/dev/null || true
              fi
              # Patch RPATH
              RPATH=$(patchelf --print-rpath "$f" 2>/dev/null || true)
              if [ -n "$RPATH" ] && echo "$RPATH" | grep -qF "$OLD_PKG"; then
                NEW_RPATH=$(echo "$RPATH" | sed "s|${OLD_PKG}|${NEW_PKG}|g")
                patchelf --set-rpath "$NEW_RPATH" "$f" 2>/dev/null || true
              fi
            else
              # Non-ELF (likely script or config): use sed
              # Note: This is only safe for text files.
              if file "$f" | grep -qE 'text|script'; then
                sed -i "s|${OLD_PREFIX}|${NEW_PREFIX}|g" "$f" 2>/dev/null || true
                sed -i "s|${OLD_PKG}|${NEW_PKG}|g" "$f" 2>/dev/null || true
              fi
            fi
          done
          
          # 3. Debug check
          if [ -f bin/login ]; then
            echo "Interpreter for bin/login:"
            patchelf --print-interpreter bin/login || echo "No interpreter"
          fi
          
          # 4. Ensure execution permissions
          find bin libexec -type f -exec chmod +x {} + 2>/dev/null || true
          find usr/bin usr/libexec -type f -exec chmod +x {} + 2>/dev/null || true
          
          # 5. Repack bootstrap
          zip -q -r "../bootstrap-${ARCH}.zip" .
          cd ..
          echo "Repacked: $(du -sh bootstrap-${ARCH}.zip | cut -f1)"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: bootstrap-${{ matrix.arch }}.zip
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apk:
    name: Build NewTermux APK
    needs: patch-bootstraps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
