name: NewTermux Full Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.1.2'

jobs:
  patch-bootstraps:
    name: Patch Bootstrap (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64, i686]
    steps:
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y patchelf jq zip

      - name: Download official Termux bootstrap
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/termux/termux-packages/releases/latest")
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r --arg arch "bootstrap-${{ matrix.arch }}.zip" '.assets[] | select(.name == $arch) | .browser_download_url')
          curl -L -o "bootstrap-${{ matrix.arch }}.zip" "$DOWNLOAD_URL"

      - name: Patch bootstrap paths
        run: |
          ARCH="${{ matrix.arch }}"
          OLD_USR="/data/data/com.termux/files/usr"
          NEW_USR="/data/data/com.newtermux.app/u"
          OLD_HOME="/data/data/com.termux/files/home"
          NEW_HOME="/data/data/com.newtermux.app/h"
          
          mkdir -p extract
          unzip -q "bootstrap-${ARCH}.zip" -d extract/
          cd extract
          
          # 1. Text-based replacement
          echo "Patching scripts and configs..."
          find . -type f | while read f; do
            if file "$f" | grep -qE 'text|script'; then
              sed -i "s|${OLD_USR}|${NEW_USR}|g" "$f" 2>/dev/null || true
              sed -i "s|${OLD_HOME}|${NEW_HOME}|g" "$f" 2>/dev/null || true
              sed -i "s|com.termux|com.newtermux.app|g" "$f" 2>/dev/null || true
              sed -i "s|Termux|NewTermux|g" "$f" 2>/dev/null || true
            fi
          done

          # 2. Binary-safe replacement
          echo "Patching binaries safely..."
          python3 -c "
import os
def patch_file(path, old_str, new_str):
    if len(new_str) > len(old_str): return
    with open(path, 'rb') as f: data = f.read()
    if old_str.encode() not in data: return
    print(f'Binary patching {path}...')
    pad = b'\0' * (len(old_str) - len(new_str))
    replacement = new_str.encode() + pad
    new_data = data.replace(old_str.encode(), replacement)
    with open(path, 'wb') as f: f.write(new_data)

for root, dirs, files in os.walk('.'):
    for name in files:
        p = os.path.join(root, name)
        patch_file(p, '$OLD_USR', '$NEW_USR')
        patch_file(p, '$OLD_HOME', '$NEW_HOME')
"

          # 3. ELF Header patching
          echo "Patching ELF headers..."
          find . -type f | while read f; do
            if file "$f" | grep -q 'ELF'; then
              INTERP=$(patchelf --print-interpreter "$f" 2>/dev/null || true)
              if [ -n \"$INTERP\" ] && echo \"$INTERP\" | grep -qF \"com.termux\"; then
                NEW_INTERP=$(echo \"$INTERP\" | sed \"s|${OLD_USR}|${NEW_USR}|g\")
                patchelf --set-interpreter \"$NEW_INTERP\" \"$f\" 2>/dev/null || true
              fi
              RPATH=$(patchelf --print-rpath \"$f\" 2>/dev/null || true)
              if [ -n \"$RPATH\" ] && echo \"$RPATH\" | grep -qF \"com.termux\"; then
                NEW_RPATH=$(echo \"$RPATH\" | sed \"s|${OLD_USR}|${NEW_USR}|g\")
                patchelf --set-rpath \"$NEW_RPATH\" \"$f\" 2>/dev/null || true
              fi
            fi
          done
          
          # 4. Branding
          if [ -f etc/motd ]; then
            echo "Welcome to NewTermux!" > etc/motd
          fi
          
          # 5. Permissions
          find bin libexec -type f -exec chmod +x {} + 2>/dev/null || true
          find usr/bin usr/libexec -type f -exec chmod +x {} + 2>/dev/null || true
          
          # 6. Repack
          zip -q -r "../bootstrap-${ARCH}.zip" .
          cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: bootstrap-${{ matrix.arch }}.zip
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apk:
    name: Build NewTermux APK
    needs: patch-bootstraps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
