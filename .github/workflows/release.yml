name: NewTermux Full Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.0.1'

jobs:
  patch-bootstraps:
    name: Patch Bootstrap (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64, i686]
    steps:
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y patchelf jq zip

      - name: Download official Termux bootstrap
        run: |
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/termux/termux-packages/releases/latest")
          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r ".assets[] | select(.name == "bootstrap-${{ matrix.arch }}.zip") | .browser_download_url")
          curl -L -o "bootstrap-${{ matrix.arch }}.zip" "$DOWNLOAD_URL"

      - name: Patch bootstrap paths
        run: |
          ARCH="${{ matrix.arch }}"
          OLD_PKG="com.termux"
          NEW_PKG="com.newtermux.app"
          OLD_PREFIX="/data/data/${OLD_PKG}/files"
          NEW_PREFIX="/data/data/${NEW_PKG}/files"
          mkdir -p extract
          unzip -q "bootstrap-${ARCH}.zip" -d extract/
          cd extract
          if [ -f SYMLINKS.txt ]; then sed -i "s|${OLD_PREFIX}|${NEW_PREFIX}|g" SYMLINKS.txt; fi
          find . -type f -print0 | xargs -0 grep -lF "$OLD_PREFIX" 2>/dev/null | xargs -0 sed -i "s|${OLD_PREFIX}|${NEW_PREFIX}|g" 2>/dev/null || true
          find . -type f | while read f; do if file "$f" | grep -q 'ELF'; then RPATH=$(patchelf --print-rpath "$f" 2>/dev/null || true); if echo "$RPATH" | grep -qF "$OLD_PKG"; then NEW_RPATH=$(echo "$RPATH" | sed "s|${OLD_PREFIX}|${NEW_PREFIX}|g"); patchelf --set-rpath "$NEW_RPATH" "$f" 2>/dev/null || true; fi; fi; done
          zip -q -r "../bootstrap-${ARCH}.zip" .

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: bootstrap-${{ matrix.arch }}.zip
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apk:
    name: Build NewTermux APK
    needs: patch-bootstraps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
