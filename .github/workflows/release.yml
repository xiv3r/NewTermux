name: NewTermux Full Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v1.6.0'

jobs:
  build-apk:
    name: Build NewTermux APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: false
          generate_release_notes: false
          body: |
            ## NewTermux ${{ github.ref_name }}

            ### What's New
            - **Settings button** in the top toolbar (between Root Toggle and + button) — tap the gear icon for instant access to settings
            - **Session close button** — each session chip now has an × to instantly kill and remove a session
            - **Package Manager** — browse and install packages directly from the toolbar
            - **Clear button** — one-tap terminal clear in the toolbar
            - **Auto-Correct bar** — suggests corrections for mistyped shell commands
            - **Speech-to-Text** — tap the mic icon to speak commands into the terminal
            - **Root Toggle** — instantly switch to a root session on rooted devices
            - **Oh My Zsh** — bundled and auto-extracted on first launch
            - **Material 3 Dark UI** — modern theme with session chips for tab management

            ### Installation
            Download the APK for your architecture:
            - `arm64-v8a` — most modern Android phones
            - `armeabi-v7a` — older 32-bit ARM devices
            - `x86_64` / `x86` — emulators and x86 devices
            - `universal` — works on all devices (larger file size)

            > **Note:** NewTermux uses the `com.termux` package name for full binary compatibility. Uninstall the original Termux before installing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
